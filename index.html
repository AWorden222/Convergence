/* ----------------------- storage (localStorage-safe) ---------------------- */

const storage = (() => {
  const mem = {};
  try {
    const t = "__convergence_test__";
    window.localStorage.setItem(t, "1");
    window.localStorage.removeItem(t);
    return {
      get: (k) => window.localStorage.getItem(k),
      set: (k, v) => window.localStorage.setItem(k, v),
      remove: (k) => window.localStorage.removeItem(k),
    };
  } catch {
    return {
      get: (k) => (k in mem ? mem[k] : null),
      set: (k, v) => { mem[k] = v; },
      remove: (k) => { delete mem[k]; },
    };
  }
})();

/* 3-2-1 countdown */
function Countdown({ onDone }) {
  const [step, setStep] = useState(3);
  useEffect(() => {
    if (step === 0) { const t = setTimeout(onDone, 900); return () => clearTimeout(t); }
    const t = setTimeout(() => setStep((s) => s - 1), 850);
    return () => clearTimeout(t);
  }, [step, onDone]);
  return (
    <div className="cv-center" style={{ padding: "40px 0" }} aria-live="assertive">
      {step > 0
        ? <div className="cv-bigcount" key={step}>{step}</div>
        : <div className="cv-bigcount is-go" key="go">Say your word!</div>}
    </div>
  );
}

/* 30-second think timer */
function ThinkTimer({ resetKey }) {
  const [left, setLeft] = useState(30);
  useEffect(() => {
    setLeft(30);
    const iv = setInterval(() => setLeft((l) => (l > 0 ? l - 1 : 0)), 1000);
    return () => clearInterval(iv);
  }, [resetKey]);
  const pct = left / 30;
  return (
    <div className={`cv-timer ${left <= 10 ? "is-low" : ""}`} aria-label={`${left} seconds left to think`}>
      <svg width="34" height="34" viewBox="0 0 36 36">
        <circle cx="18" cy="18" r="15" fill="none" stroke="#d6ebe8" strokeWidth="4" />
        <circle cx="18" cy="18" r="15" fill="none" stroke={left <= 10 ? "#fb7185" : "#0d9488"} strokeWidth="4"
          strokeDasharray={`${pct * 94.2} 94.2`} strokeLinecap="round" transform="rotate(-90 18 18)"
          style={{ transition: "stroke-dasharray 1s linear" }} />
      </svg>
      <span className="num">{left > 0 ? `${left}s` : "Time!"}</span>
      <span className="cv-micro">{left > 0 ? "to think of a connection" : "lock in your best word"}</span>
    </div>
  );
}

/* private word entry with pass-the-device gate */
function PlayerWordEntry({ playerName, currentWords, attemptNo, onLock, timerKey }) {
  const [ready, setReady] = useState(false);
  const [word, setWord] = useState("");
  const inputRef = useRef(null);
  useEffect(() => { if (ready) inputRef.current?.focus(); }, [ready]);

  if (!ready) {
    return (
      <div className="cv-panel cv-center cv-stack">
        <div className="cv-eyebrow">Attempt {attemptNo} · Pass the device</div>
        <h2>{playerName}'s turn</h2>
        <p className="cv-sub">No peeking, other player! 👀</p>
        <button className="cv-btn cv-btn-primary cv-btn-block" onClick={() => setReady(true)}>
          I'm {playerName} — show me
        </button>
      </div>
    );
  }
  return (
    <div className="cv-panel cv-stack">
      <div className="cv-eyebrow cv-center">Attempt {attemptNo} · {playerName}</div>
      <div className="cv-words">
        <span className="cv-chip">{currentWords[0]}</span>
        <span className="cv-plus">+</span>
        <span className="cv-chip is-yellow">{currentWords[1]}</span>
      </div>
      <ThinkTimer resetKey={timerKey} />
      <p className="cv-micro cv-center">Think of one word that connects these two. Keep it secret!</p>
      <input
        ref={inputRef}
        className="cv-input"
        value={word}
        placeholder="Your word…"
        maxLength={30}
        onChange={(e) => setWord(e.target.value)}
        onKeyDown={(e) => { if (e.key === "Enter" && norm(word)) onLock(word); }}
        aria-label={`${playerName}, enter your connecting word`}
      />
      <button className="cv-btn cv-btn-yellow cv-btn-block" disabled={!norm(word)} onClick={() => onLock(word)}>
        Lock word 🔒
      </button>
    </div>
  );
}

      <div className="cv-attemptrow">
        <span className="tag">Start</span>
        <span className="pair">{initialWords[0]} + {initialWords[1]}</span>
      </div>
      {attempts.map((a, i) => (
        <div key={i} className={`cv-attemptrow ${a.match ? "is-match" : ""}`}>
          <span className="tag">{a.match ? "Match!" : `Try ${i + 1}`}</span>
          <span className="pair">{a.p1} + {a.p2}</span>
        </div>
      ))}
      <p className="cv-micro" style={{ paddingLeft: 4 }}>
        Left word = {players[0]} · right word = {players[1]}
      </p>
    </div>
  );
}

/* results summary */
function ScoreResult({ result, players }) {
  const lvl = levelFor(result.score);
  return (
    <>
      <div className="cv-score-grid">
        <div className="cv-stat"><div className="v">{DIFFICULTY_LABEL[result.difficulty]}</div><div className="k">Difficulty</div></div>
        <div className="cv-stat"><div className="v">{BASE_SCORE[result.difficulty]}</div><div className="k">Base score</div></div>
        <div className="cv-stat"><div className="v">{result.attempts}</div><div className="k">Attempts</div></div>
        <div className="cv-stat"><div className="v">{result.score}</div><div className="k">Final score</div></div>
      </div>
      <div className="cv-levelbadge">
        <div className="t">{lvl.title}</div>
        <div>{lvl.desc}</div>
      </div>
      <hr className="cv-divider" />
      <h3 style={{ marginBottom: 10 }}>Your word path</h3>
      <AttemptHistory initialWords={result.initialWords} attempts={result.path} players={players} />
    </>
  );
}

/* saved rounds */
function ScoreHistory({ history, onClear }) {
  if (history.length === 0) {
    return (
      <div className="cv-panel cv-center cv-stack">
        <h2>No rounds yet</h2>
        <p className="cv-sub">Play a round and your scores will show up here.</p>
      </div>
    );
  }
  return (
    <div className="cv-stack">
      <div className="cv-hist">
        {history.map((r) => (
          <div className="cv-histrow" key={r.round + r.date}>
            <div className="top">
              <span className="rd">Round {r.round} — "{r.word}"</span>
              <span className="lv">{r.level}</span>
            </div>
            <span className="meta">
              {r.players[0]} & {r.players[1]} · {DIFFICULTY_LABEL[r.difficulty]} ·{" "}
              {r.attempts} attempt{r.attempts === 1 ? "" : "s"} · {r.score} pts
            </span>
          </div>
        ))}
      </div>
      <button className="cv-btn cv-btn-ghost" onClick={onClear}>Clear history</button>
    </div>
  );
}

/* how to play modal */
function HowToPlayModal({ onClose }) {
  return (
    <div className="cv-modal-backdrop" onClick={onClose} role="dialog" aria-modal="true" aria-label="How to play">
      <div className="cv-modal cv-stack" onClick={(e) => e.stopPropagation()}>
        <h2>How to play</h2>
        <ol>
          <li>Each player secretly draws a card with an <strong>Easy</strong>, <strong>Medium</strong>, and <strong>Hard</strong> word.</li>
          <li>Agree on a difficulty together — but <strong>never say any words from your cards</strong>.</li>
          <li>The <strong>Initial Countdown</strong> reveals both starting words. It doesn't count as an attempt.</li>
          <li>Each attempt, you have <strong>30 seconds</strong> to think of one word that connects the two current words. Enter it privately, then reveal together.</li>
          <li>You win the round when you both say the <strong>exact same word</strong> — that's convergence!</li>
        </ol>
        <hr className="cv-divider" />
        <h3>Scoring (lower is better)</h3>
        <ul>
          <li>Easy = 3 pts · Medium = 2 pts · Hard = 1 pt</li>
          <li><strong>Final score = base score × attempts</strong></li>
        </ul>
        <button className="cv-btn cv-btn-primary cv-btn-block" onClick={onClose}>Got it!</button>
      </div>
    </div>
  );
}

/* scripted example round */
function ExampleRound({ onBack }) {
  const steps = [
    { tag: "Cards", text: "Player 1 draws Tree / Forest / Canopy. Player 2 draws Stream / River / Tributary. Cards stay secret!" },
    { tag: "Difficulty", text: "Both players agree on Medium (2 points per attempt)." },
    { tag: "Countdown", text: "Initial Countdown reveals: Forest + River. This doesn't count as an attempt." },
    { tag: "Attempt 1", text: "Player 1 says Nature, Player 2 says Stream. No match — keep going!" },
    { tag: "Attempt 2", text: "Player 1 says Waterfall, Player 2 says Trail. So close, but no match." },
    { tag: "Attempt 3", text: "Both say Hiking. Convergence! 🎉" },
    { tag: "Score", text: "Medium (2) × 3 attempts = 6 points → Psychic Link: practically telepathic." },
  ];
  const [shown, setShown] = useState(1);
  return (
    <div className="cv-panel cv-stack">
      <div className="cv-eyebrow">Example round</div>
      <h2>Forest meets River</h2>
      <div className="cv-attempts">
        {steps.slice(0, shown).map((s, i) => (
          <div key={i} className={`cv-attemptrow ${s.tag === "Attempt 3" || s.tag === "Score" ? "is-match" : ""}`}>
            <span className="tag">{s.tag}</span>
            <span style={{ lineHeight: 1.45 }}>{s.text}</span>
          </div>
        ))}
      </div>
      {shown < steps.length
        ? <button className="cv-btn cv-btn-yellow" onClick={() => setShown(shown + 1)}>Next step →</button>
        : <button className="cv-btn cv-btn-primary" onClick={onBack}>Back to home</button>}
    </div>
  );
}

/* --------------------------------- the app -------------------------------- */

function App() {
  const [phase, setPhase] = useState("home");
  const [players, setPlayers] = useState(["Player 1", "Player 2"]);
  const [cards, setCards] = useState([null, null]);
  const [cardFlipped, setCardFlipped] = useState(false);
  const [difficulty, setDifficulty] = useState(null);
  const [initialWords, setInitialWords] = useState([null, null]);
  const [attempts, setAttempts] = useState([]);
  const [pendingP1, setPendingP1] = useState(null);
  const [result, setResult] = useState(null);
  const [history, setHistory] = useState(loadHistory);
  const [showRules, setShowRules] = useState(false);

  const go = useCallback((p) => { setPhase(p); setCardFlipped(false); }, []);

  /* round lifecycle ------------------------------------------------------- */

  const startRound = () => {
    const shuffled = [...DECK].sort(() => Math.random() - 0.5);
    setCards([shuffled[0], shuffled[1]]);
    setDifficulty(null);
    setAttempts([]);
    setPendingP1(null);
    setResult(null);
    go("player1Card");
  };

  const chooseDifficulty = (d) => {
    setDifficulty(d);
    setInitialWords([cards[0][d], cards[1][d]]);
    go("initialCountdown");
  };

  const finishRound = (finalAttempts, word) => {
    const score = BASE_SCORE[difficulty] * finalAttempts.length;
    const res = {
      difficulty,
      attempts: finalAttempts.length,
      score,
      word,
      initialWords,
      path: finalAttempts,
      instant: finalAttempts.length === 0,
    };
    setResult(res);
    const record = {
      round: history.length + 1,
      players: [...players],
      difficulty,
      attempts: finalAttempts.length,
      score,
      level: levelFor(score).title,
      word,
      date: new Date().toISOString(),
    };
    const next = [record, ...history];
    setHistory(next);
    saveHistory(next);
    go("results");
  };

  const lockP1 = (w) => { setPendingP1(w); go("attemptEntryP2"); };

  const lockP2 = (w) => {
    const attempt = { p1: pendingP1, p2: w, match: norm(pendingP1) === norm(w) };
    setAttempts((prev) => [...prev, attempt]);
    setPendingP1(null);
    go("attemptReveal");
  };

  const markAsMatch = () => {
    const updated = attempts.map((a, i) => (i === attempts.length - 1 ? { ...a, match: true } : a));
    setAttempts(updated);
    finishRound(updated, updated[updated.length - 1].p1);
  };

  const nextAttempt = () => go("attemptEntryP1");

  /* derived --------------------------------------------------------------- */

  const lastAttempt = attempts[attempts.length - 1];
  const currentWords = lastAttempt ? [lastAttempt.p1, lastAttempt.p2] : initialWords;
  const initialIsMatch = initialWords[0] && norm(initialWords[0]) === norm(initialWords[1]);

  /* screens ---------------------------------------------------------------- */

  const screens = {
    home: (
      <div className="cv-hero">
        <VennLogo size={120} />
        <div className="cv-eyebrow">A word association game for two minds</div>
        <h1>Convergence</h1>
        <p className="cv-sub">Can you and your partner think your way to the same word?</p>
        <div className="cv-stack" style={{ maxWidth: 320, margin: "0 auto" }}>
          <button className="cv-btn cv-btn-primary cv-btn-block" onClick={() => go("playerSetup")}>Start game</button>
          <button className="cv-btn cv-btn-ghost cv-btn-block" onClick={() => setShowRules(true)}>How to play</button>
          <button className="cv-btn cv-btn-ghost cv-btn-block" onClick={() => go("exampleRound")}>View example round</button>
        </div>
      </div>
    ),

    playerSetup: (
      <div className="cv-panel cv-stack">
        <div className="cv-eyebrow">Who's playing?</div>
        <h2>Name your duo</h2>
        {[0, 1].map((i) => (
          <input key={i} className="cv-input cv-input-sm" value={players[i]}
            maxLength={20}
            aria-label={`Player ${i + 1} name`}
            onChange={(e) => {
              const next = [...players];
              next[i] = e.target.value;
              setPlayers(next);
            }}
            onBlur={() => {
              if (!players[i].trim()) {
                const next = [...players];
                next[i] = `Player ${i + 1}`;
                setPlayers(next);
              }
            }} />
        ))}
        <button className="cv-btn cv-btn-primary cv-btn-block" onClick={startRound}>Start round 🃏</button>
      </div>
    ),

    player1Card: (
      <SecretCardScreen key="p1" playerName={players[0]} card={cards[0]}
        flipped={cardFlipped} setFlipped={setCardFlipped}
        onDone={() => go("player2Card")} />
    ),

    player2Card: (
      <SecretCardScreen key="p2" playerName={players[1]} card={cards[1]}
        flipped={cardFlipped} setFlipped={setCardFlipped}
        onDone={() => go("difficultySelect")} />
    ),

    difficultySelect: (
      <div className="cv-panel cv-stack">
        <div className="cv-eyebrow">Together now</div>
        <h2>Choose a difficulty for this round</h2>
        <div className="cv-banner">🤫 Do not say any actual words from your card during this discussion.</div>
        <div className="cv-diff">
          {["easy", "medium", "hard"].map((d) => (
            <button key={d} className="cv-diffbtn" onClick={() => chooseDifficulty(d)}>
              <span className="nm">{DIFFICULTY_LABEL[d]}</span>
              <span className="pts">{BASE_SCORE[d]} pts × attempt</span>
            </button>
          ))}
        </div>
        <p className="cv-micro cv-center">Lower scores are better — harder words score fewer points per attempt.</p>
      </div>
    ),

    initialCountdown: <InitialCountdownScreen
      players={players}
      initialWords={initialWords}
      isMatch={initialIsMatch}
      onContinue={() => go("attemptEntryP1")}
      onInstant={() => finishRound([], initialWords[0])}
    />,

    attemptEntryP1: (
      <PlayerWordEntry key={`p1-${attempts.length}`} playerName={players[0]}
        currentWords={currentWords} attemptNo={attempts.length + 1}
        timerKey={attempts.length} onLock={lockP1} />
    ),

    attemptEntryP2: (
      <PlayerWordEntry key={`p2-${attempts.length}`} playerName={players[1]}
        currentWords={currentWords} attemptNo={attempts.length + 1}
        timerKey={attempts.length} onLock={lockP2} />
    ),

    attemptReveal: lastAttempt && (
      <div className="cv-panel cv-stack cv-center">
        <div className="cv-eyebrow">Attempt {attempts.length} · Did you converge?</div>
        <div className="cv-words">
          <span className="cv-chip cv-anim-l">
            <span className="cv-chip-owner">{players[0]}</span>{lastAttempt.p1}
          </span>
          <span className="cv-plus cv-anim-pop">{lastAttempt.match ? "=" : "+"}</span>
          <span className="cv-chip is-yellow cv-anim-r">
            <span className="cv-chip-owner">{players[1]}</span>{lastAttempt.p2}
          </span>
        </div>
        {lastAttempt.match ? (
          <>
            <h2 className="cv-anim-pop">Nice — you found the same word! 🎉</h2>
            <button className="cv-btn cv-btn-primary cv-btn-block"
              onClick={() => finishRound(attempts, lastAttempt.p1)}>
              See your score
            </button>
          </>
        ) : (
          <>
            <h2>No match. Think of a new connection.</h2>
            <p className="cv-micro">Your new current words are the two above.</p>
            <button className="cv-btn cv-btn-yellow cv-btn-block" onClick={nextAttempt}>
              Next attempt →
            </button>
            <button className="cv-btn cv-btn-quiet" onClick={markAsMatch}>
              Mark as match (typo / plural / close enough)
            </button>
          </>
        )}
        <hr className="cv-divider" />
        <AttemptHistory initialWords={initialWords} attempts={attempts} players={players} />
      </div>
    ),

    results: result && (
      <div className="cv-panel cv-stack">
        <div className="cv-center">
          <VennLogo size={70} />
          <div className="cv-eyebrow">{result.instant ? "Instant convergence!" : "Convergence achieved!"}</div>
          <h2>{players[0]} & {players[1]} converged on "{result.word}"</h2>
        </div>
        <ScoreResult result={result} players={players} />
        <div className="cv-stack" style={{ marginTop: 8 }}>
          <button className="cv-btn cv-btn-primary cv-btn-block" onClick={startRound}>Play another round</button>
          <button className="cv-btn cv-btn-ghost cv-btn-block" onClick={() => go("history")}>View score history</button>
          <button className="cv-btn cv-btn-quiet cv-btn-block" onClick={() => go("home")}>Back to home</button>
        </div>
      </div>
    ),

    history: (
      <div className="cv-stack">
        <div>
          <div className="cv-eyebrow">Your duo's record</div>
          <h2>Score history</h2>
        </div>
        <ScoreHistory history={history} onClear={() => { setHistory([]); storage.remove(HISTORY_KEY); }} />
        <button className="cv-btn cv-btn-primary" onClick={() => go("home")}>Back to home</button>
      </div>
    ),

    exampleRound: <ExampleRound onBack={() => go("home")} />,
  };

  return (
    <div className="cv-root">
      <style>{CSS}</style>
      <div className="cv-shell">
        {phase !== "home" && <TopBar go={go} />}
        {screens[phase]}
      </div>
      {showRules && <HowToPlayModal onClose={() => setShowRules(false)} />}
    </div>
  );
}

/* ------------------------- secret card draw screen ------------------------ */

function SecretCardScreen({ playerName, card, flipped, setFlipped, onDone }) {
  const [confirmed, setConfirmed] = useState(false);
  if (!card) return null;

  if (!confirmed) {
    return (
      <div className="cv-panel cv-center cv-stack">
        <div className="cv-eyebrow">Pass the device 📲</div>
        <h2>{playerName}, view your card.</h2>
        <p className="cv-sub">Keep it secret!</p>
        <button className="cv-btn cv-btn-primary cv-btn-block" onClick={() => setConfirmed(true)}>
          I'm {playerName} — continue
        </button>
      </div>
    );
  }

  return (
    <div className="cv-stack cv-center">
      <div className="cv-eyebrow">{playerName}'s secret card</div>
      <CardDisplay card={card} flipped={flipped} />
      {!flipped ? (
        <button className="cv-btn cv-btn-yellow" onClick={() => setFlipped(true)}>Reveal my card</button>
      ) : (
        <>
          <p className="cv-micro">Memorize all three words — you'll pick a difficulty together next.</p>
          <button className="cv-btn cv-btn-primary" onClick={() => { setFlipped(false); setTimeout(onDone, 350); }}>
            Hide card & pass on
          </button>
        </>
      )}
    </div>
  );
}

/* ----------------------- initial countdown screen ------------------------- */

function InitialCountdownScreen({ players, initialWords, isMatch, onContinue, onInstant }) {
  const [stage, setStage] = useState("intro"); // intro → counting → revealed

  return (
    <div className="cv-panel cv-stack cv-center">
      <div className="cv-eyebrow">Initial countdown</div>

      {stage === "intro" && (
        <>
          <h2>Ready to reveal your starting words?</h2>
          <p className="cv-sub">This reveals your starting words. It does <strong>not</strong> count as an attempt.</p>
          <button className="cv-btn cv-btn-primary cv-btn-block" onClick={() => setStage("counting")}>
            Start countdown
          </button>
        </>
      )}

      {stage === "counting" && <Countdown onDone={() => setStage("revealed")} />}

      {stage === "revealed" && (
        <>
          <h2>Your starting words</h2>
          <div className="cv-words">
            <span className="cv-chip cv-anim-l">
              <span className="cv-chip-owner">{players[0]}</span>{initialWords[0]}
            </span>
            <span className="cv-plus cv-anim-pop">{isMatch ? "=" : "+"}</span>
            <span className="cv-chip is-yellow cv-anim-r">
              <span className="cv-chip-owner">{players[1]}</span>{initialWords[1]}
            </span>
          </div>
          {isMatch ? (
            <>
              <h2 className="cv-anim-pop">Whoa — instant convergence! 🤯</h2>
              <p className="cv-sub">Same starting word, zero attempts. That's as good as it gets.</p>
              <button className="cv-btn cv-btn-primary cv-btn-block" onClick={onInstant}>See your score</button>
            </>
          ) : (
            <>
              <p className="cv-sub">Think of the connection. You've got 30 seconds per attempt.</p>
              <button className="cv-btn cv-btn-yellow cv-btn-block" onClick={onContinue}>Start attempt 1 →</button>
            </>
          )}
        </>
      )}
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
